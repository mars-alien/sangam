spring:
  jpa:
    show-sql: false
  cache:
    type: redis
    redis:
      time-to-live: 60000

jwt:
  secret: test-secret-key-must-be-at-least-32-chars-long
  access-expiry-ms: 900000
  refresh-expiry-ms: 604800000

app:
  frontend-url: http://localhost:3000

logging:
  level:
    com.gatherup: WARN
    root: WARN
